services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - osint-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - osint-net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - osint-net
    command: celery -A app.workers.celery_app worker --loglevel=info

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - osint-net
    command: celery -A app.workers.celery_app beat --loglevel=info

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"  # 5432 del host ya lo usa otro proyecto local (portadas_db); interno sigue en 5432
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-osint}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-osint}
      - POSTGRES_DB=${POSTGRES_DB:-osint_monitor}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-osint}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - osint-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - osint-net

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-osint_admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-osint_admin_password}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    networks:
      - osint-net

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    networks:
      - osint-net
    # GPU opcional (descomentar si hay NVIDIA + nvidia-container-toolkit en WSL2):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

networks:
  osint-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
  ollamadata:
